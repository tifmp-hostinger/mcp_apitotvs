services:
  checkout:
    image: checkout:latest
    build:
      context: ./www/api
      dockerfile: ../../Dockerfile

    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

    volumes:
      - ./www/api:/var/www/html

    ports:
      - "80:80"

    networks:
      - main_network

networks:
  main_network:
    external: true